name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Test
        run: pytest -q

  build-windows-exe:
    name: Build Windows .exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller watchdog pystray pillow
      - name: Build
        run: pyinstaller printwatcher.spec --noconfirm
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintWatcher-windows
          path: dist/PrintWatcher.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach to GitHub Release
    needs: build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PrintWatcher-windows
          path: ./release
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: release/PrintWatcher.exe
          generate_release_notes: true
