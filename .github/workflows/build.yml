name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Test + Build Windows binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: csharp/global.json
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,backend]"
          python -m pip install pyinstaller
      - name: Pytest
        run: pytest -q
      - name: Restore C# solution
        working-directory: csharp
        run: dotnet restore PrintWatcher.sln
      - name: Build C# solution
        working-directory: csharp
        run: dotnet build PrintWatcher.sln --configuration Release --no-restore
      - name: Test C# shell
        working-directory: csharp
        run: dotnet test src/PrintWatcher.Shell.Tests/PrintWatcher.Shell.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"
      - name: Build UI binary (windowed)
        run: pyinstaller printwatcher.spec --noconfirm
      - name: Build CLI binary (console)
        run: pyinstaller printwatcher-cli.spec --noconfirm
      - name: Build backend binary (headless server for WinUI shell)
        run: pyinstaller printwatcher-backend.spec --noconfirm
      - name: Bundle release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/PrintWatcher.exe release/
          Copy-Item dist/PrintWatcher-cli.exe release/
          Copy-Item dist/PrintWatcher-backend.exe release/
          Copy-Item README.md release/
          Copy-Item LICENSE release/
          Copy-Item assets/printwatcher.png release/icon.png
          Compress-Archive -Path release/* -DestinationPath release/PrintWatcher-windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintWatcher-windows
          path: |
            dist/PrintWatcher.exe
            dist/PrintWatcher-cli.exe
            dist/PrintWatcher-backend.exe
            release/PrintWatcher-windows.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach to GitHub Release
    needs: build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PrintWatcher-windows
          path: ./release
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/dist/PrintWatcher.exe
            release/dist/PrintWatcher-cli.exe
            release/dist/PrintWatcher-backend.exe
            release/release/PrintWatcher-windows.zip
          generate_release_notes: true
