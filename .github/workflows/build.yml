name: build

on:
  push:
    branches: [main, 'claude/**']
    tags: ['v*']
  pull_request:
    # Trigger for any target branch so stacked PRs (claude/winui-csharp-shell
    # → claude/winui-shell-pages → ...) get CI without waiting for upstream to merge.
    branches: ['**']
  workflow_dispatch:

jobs:
  build-windows-exe:
    name: Test + Build Windows binaries
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: csharp/global.json
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,backend]"
          python -m pip install pyinstaller
      - name: Pytest
        run: pytest -q
      - name: Restore C# solution
        working-directory: csharp
        run: dotnet restore PrintWatcher.sln
      - name: Build C# solution
        working-directory: csharp
        run: dotnet build PrintWatcher.sln --configuration Release --no-restore
      - name: Test C# shell
        working-directory: csharp
        run: dotnet test src/PrintWatcher.Shell.Tests/PrintWatcher.Shell.Tests.csproj --configuration Release --no-build --logger "console;verbosity=normal"
      # Self-contained publish for the WinUI shell.
      #
      # `-p:Platform=x64` is mandatory: <Platforms>x64</Platforms> in the
      # csproj only declares the supported list — the publish target still
      # defaults to AnyCPU, and Microsoft.WindowsAppSDK.SelfContained.targets
      # explicitly fails with "The platform 'AnyCPU' is not supported for
      # Self Contained mode" without it. Don't add `-p:EnableMsixTooling=false`
      # or `-p:GenerateAppxPackageOnBuild=false` here — they break manifest
      # processing for unpackaged builds (verified locally; previous CI
      # attempts that included them failed with an opaque exit code 1).
      - name: Publish WinUI shell (self-contained, win-x64)
        working-directory: csharp
        run: >
          dotnet publish src/PrintWatcher.Shell/PrintWatcher.Shell.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:Platform=x64
          -p:WindowsAppSDKSelfContained=true
          --output publish/shell
      - name: Build UI binary (legacy Tk, windowed)
        run: pyinstaller printwatcher.spec --noconfirm
      - name: Build CLI binary (console)
        run: pyinstaller printwatcher-cli.spec --noconfirm
      - name: Build backend binary (headless server for WinUI shell)
        run: pyinstaller printwatcher-backend.spec --noconfirm
      - name: Bundle release zip
        shell: pwsh
        run: |
          # Stage everything that ships in v0.4 into a single folder. Native
          # WinUI shell becomes the canonical PrintWatcher.exe (with its
          # self-contained .NET 8 + Windows App SDK runtime alongside). Tk
          # binary is renamed PrintWatcher-legacy.exe so it doesn't collide;
          # ships through v0.5 then deletes per docs/ARCHITECTURE.md.
          New-Item -ItemType Directory -Force -Path release-stage | Out-Null
          Copy-Item -Recurse csharp/publish/shell/* release-stage/
          Copy-Item dist/PrintWatcher.exe         release-stage/PrintWatcher-legacy.exe
          Copy-Item dist/PrintWatcher-cli.exe     release-stage/
          Copy-Item dist/PrintWatcher-backend.exe release-stage/
          Copy-Item README.md  release-stage/
          Copy-Item LICENSE    release-stage/
          Copy-Item assets/printwatcher.png release-stage/icon.png
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path release-stage/* -DestinationPath release/PrintWatcher-windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrintWatcher-windows
          path: |
            csharp/publish/shell/PrintWatcher.exe
            dist/PrintWatcher.exe
            dist/PrintWatcher-cli.exe
            dist/PrintWatcher-backend.exe
            release/PrintWatcher-windows.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach to GitHub Release
    needs: build-windows-exe
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: PrintWatcher-windows
          path: ./release
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/dist/PrintWatcher.exe
            release/dist/PrintWatcher-cli.exe
            release/dist/PrintWatcher-backend.exe
            release/release/PrintWatcher-windows.zip
          generate_release_notes: true
